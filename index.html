<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW SCRAPER v0.8.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'VT323', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 65, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 4s linear infinite;
            z-index: 1;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .card {
            background: #111;
            border: 2px solid #00ff41;
            box-shadow: 0 0 30px #00ff41, inset 0 0 20px rgba(0, 255, 65, 0.2);
            width: 420px;
            padding: 25px;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px dashed #00ff41;
            padding-bottom: 10px;
        }

        .header h1 {
            font-size: 28px;
            margin: 0;
            text-shadow: 0 0 10px #00ff41;
            letter-spacing: 4px;
        }

        .status {
            color: #ff0000;
            font-size: 14px;
            text-align: center;
            margin: 8px 0;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        input {
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px;
            width: 100%;
            font-family: 'VT323', monospace;
            font-size: 18px;
            margin-bottom: 15px;
        }

        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 15px;
            width: 100%;
            font-family: 'VT323', monospace;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px #00ff41;
        }

        button:hover {
            background: #ff0000;
            color: #fff;
            box-shadow: 0 0 25px #ff0000;
        }

        .output {
            margin-top: 20px;
            background: #000;
            border: 1px solid #00ff41;
            padding: 15px;
            min-height: 180px;
            font-size: 16px;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 250px;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #00aa33;
        }

        .glitch {
            animation: glitch 0.5s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="card">
        <div class="header">
            <h1 class="glitch">SHADOW SCRAPER</h1>
            <div class="status">● UNDERCOVER MODE ACTIVE ● TOR ROUTED ●</div>
        </div>
        
        <input type="text" id="target" placeholder="ENTER TARGET URL[](http://victim.com)" value="https://example.com">
        
        <button onclick="scrape()">INITIATE SCRAPE ATTACK</button>
        
        <div class="output" id="result">
[SYSTEM READY]
Waiting for target...
        </div>
        
        <div class="footer">
            v0.8.1 | NO TRACE LEFT | SCRAPE THE SYSTEM
        </div>
    </div>

    <script>
        function scrape() {
            const target = document.getElementById('target').value;
            const result = document.getElementById('result');
            
            result.innerHTML = `[+] CONNECTING TO PROXY...\n`;
            
            setTimeout(() => {
                result.innerHTML += `[+] BYPASSING CLOUDFLARE...\n`;
            }, 400);
            
            setTimeout(() => {
                result.innerHTML += `[+] SCRAPING IN PROGRESS... ${target}\n`;
            }, 900);
            
            setTimeout(() => {
                result.innerHTML += `-------------------------------\n`;
                result.innerHTML += `EMAILS FOUND: 47\n`;
                result.innerHTML += `PASSWORDS HASHED: 23\n`;
                result.innerHTML += `USER AGENTS: 156\n`;
                result.innerHTML += `SENSITIVE DATA: 89kb\n`;
                result.innerHTML += `[+] DATA SAVED TO /shadow/loot/${Date.now()}.txt\n`;
                result.innerHTML += `-------------------------------\n`;
                result.innerHTML += `MISSION COMPLETE BHAI 🔥\n`;
            }, 1800);
        }

        // Auto type effect
        document.addEventListener('keydown', function(e) {
            if (e.key === "Enter") {
                scrape();
            }
        });
        
        console.log("%cUNDERCOVER HACKING MODE ENABLED - DON'T GET CAUGHT MF", "color: red; font-size: 20px");
    </script>
</body>
</html>
