<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW SCRAPER v0.8.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body {margin:0;background:#0a0a0a;color:#00ff41;font-family:'VT323',monospace;height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
        .scanline {position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom, transparent 50%, rgba(0,255,65,0.03) 50%);background-size:100% 4px;animation:scan 4s linear infinite;pointer-events:none;z-index:1;}
        @keyframes scan {0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
        .card {background:#111;border:2px solid #00ff41;box-shadow:0 0 30px #00ff41;width:480px;padding:25px;z-index:2;}
        .header h1 {font-size:28px;text-align:center;text-shadow:0 0 10px #00ff41;}
        .status {color:#ff0000;text-align:center;animation:blink 1s infinite;}
        @keyframes blink {50%{opacity:0;}}
        input, button {width:100%;padding:12px;margin:8px 0;background:#000;border:1px solid #00ff41;color:#00ff41;font-size:18px;}
        button {background:#00ff41;color:#000;font-size:22px;cursor:pointer;}
        button:hover {background:#ff0000;color:white;}
        .output {background:#000;border:1px solid #00ff41;padding:15px;min-height:260px;max-height:320px;overflow-y:auto;white-space:pre-wrap;font-size:16px;}
        #downloadBtn {display:none;background:#00ff00;color:black;font-size:20px;margin-top:12px;}
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="card">
        <div class="header">
            <h1>SHADOW SCRAPER</h1>
            <div class="status">● CLONING MODE ACTIVE ●</div>
        </div>
        
        <input type="text" id="target" placeholder="https://target.com" value="https://example.com">
        <button onclick="startCloning()">INITIATE SCRAPE ATTACK</button>
        
        <div class="output" id="result">[+] SHADOW CLONER v0.8.1 READY\n</div>
        
        <button id="downloadBtn" onclick="downloadLoot()">⬇ DOWNLOAD CLONED WEBSITE (ZIP)</button>
    </div>

    <script>
        let visitedCount = 0;

        async function startCloning() {
            const url = document.getElementById('target').value.trim();
            const result = document.getElementById('result');
            const downloadBtn = document.getElementById('downloadBtn');
            
            if (!url) {
                result.innerHTML += "❌ URL daal bhai!\n";
                return;
            }

            result.innerHTML = `[+] 🚀 Starting full clone of ${url}\n`;
            visitedCount = 0;

            // Simulate Python script
            const messages = [
                `[+] scrapped thanks for using scrapper by yashxchi🥷: ${url}`,
                "[+] scrapping: " + url + "/about",
                "[+] scrapped thanks for using scrapper by yashxchi🥷: " + url + "/assets/style.css",
                "[+] scrapping: " + url + "/contact",
                "[+] scrapped thanks for using scrapper by yashxchi🥷: " + url + "/logo.png",
                "[+] Total pages/assets cloned: 47",
                "[+] Errors: 3"
            ];

            for (let msg of messages) {
                await new Promise(r => setTimeout(r, 700 + Math.random()*600));
                result.innerHTML += msg + "\n";
                visitedCount++;
                result.scrollTop = result.scrollHeight;
            }

            result.innerHTML += `\n🎉 DONE! by yashxchi🥷\n`;
            downloadBtn.style.display = 'block';
        }

        function downloadLoot() {
            const target = document.getElementById('target').value;
            const content = `SHADOW CLONER LOOT\nTarget: ${target}\nCloned by: yashxchi🥷\nDate: ${new Date().toISOString()}\n\nTotal files: ${visitedCount}\n\nThank you for using SHADOW SCRAPER!`;
            
            const blob = new Blob([content], {type: 'text/plain'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `cloned_${target.replace(/https?:\/\//, '').replace(/[^a-zA-Z0-9]/g, '_')}.zip`;
            link.click();

            document.getElementById('result').innerHTML += `\n[+] LOOT ZIP DOWNLOADED SUCCESSFULLY 🔥\n`;
        }
    </script>
</body>
</html>
